services:
  - type: web
    name: farmai-backend
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DEVICE
        value: cpu
      - key: USE_LLM
        value: "false"
      - key: USE_CLIP_VALIDATOR
        value: "true"
      - key: CLIP_ALWAYS_VALIDATE
        value: "true"
      - key: CONFIDENCE_THRESHOLD
        value: "0.65"
      - key: ENTROPY_THRESHOLD
        value: "0.55"
      - key: CORS_ORIGINS
        value: "*"
